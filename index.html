<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো ভিডিও ডাউনলোডার</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 { color: #ff0000; margin-bottom: 10px; font-size: 28px; }
        p { color: #666; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #ff0000; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        .loader {
            display: none;
            margin-top: 15px;
            color: #ff0000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>YouTube Downloader</h1>
        <p>যেকোনো ইউটিউব ভিডিওর লিংক পেস্ট করুন</p>
        
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button id="downloadBtn" onclick="processVideo()">Download Video</button>
        
        <div class="loader" id="loadingText">ভিডিও প্রসেস হচ্ছে, অপেক্ষা করুন...</div>
    </div>

    <script>
        function processVideo() {
            var url = document.getElementById("videoUrl").value.trim();
            var videoId = "";
            var btn = document.getElementById("downloadBtn");
            var loader = document.getElementById("loadingText");

            // লিংক থেকে ভিডিও আইডি বের করা
            if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1].split("?")[0];
            } else if (url.includes("watch?v=")) {
                videoId = url.split("watch?v=")[1].split("&")[0];
            } else if (url.includes("shorts/")) {
                videoId = url.split("shorts/")[1].split("?")[0];
            }

            if(videoId !== "") {
                // বাটন হাইড করে লোডিং দেখানো
                btn.style.display = "none";
                loader.style.display = "block";

                // ২ সেকেন্ড পর ডাউনলোডের লিংকে নিয়ে যাওয়া
                setTimeout(function() {
                    window.location.href = "https://www.y2mate.com/youtube/" + videoId;
                    
                    // আগের অবস্থায় ফিরিয়ে আনা
                    setTimeout(function() {
                        btn.style.display = "block";
                        loader.style.display = "none";
                        document.getElementById("videoUrl").value = "";
                    }, 2000);
                }, 1500);

            } else {
                alert("দয়া করে একটি সঠিক ইউটিউব লিংক দিন!");
            }
        }
    </script>

</body>
</html>
